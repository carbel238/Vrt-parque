<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control de Service</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        /* --- LOGO FIJO --- */
        #logo {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 230px;
            height: auto;
            z-index: 1000;
            pointer-events: none;
        }

        /* --- PANEL DE CONFIGURACIÓN --- */
        #configPanel {
            background-color: #f5f5f5;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            z-index: 10;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            background-color: #ffffff;
            color: #111;
            border: 1px solid #ccc;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #c9302c; }

        /* --- PANEL DE VISUALIZACIÓN --- */
        #displayPanel {
            display: none; 
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            padding: 40px;
            box-sizing: border-box;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .main-content {
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        .header-info {
            position: absolute;
            top: -100px;
            right: 0;
            text-align: right;
        }

        .current-time,
        .big-timer,
        .time-val,
        .footer-name {
            color: #111;
        }

        .current-time { font-size: 40px; font-weight: bold; }
        .current-date { font-size: 20px; color: #555; }

        .times-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .time-box { text-align: center; }
        .time-val { font-size: 32px; }

        .countdown-card {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 50px 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .big-timer {
            font-size: 110px;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        .label-red {
            color: #d9534f;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .footer-name {
            font-size: 45px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            margin-top: 20px;
            border-radius: 10px;
        }

        .progress-bar {
            height: 100%;
            background: #d9534f;
            width: 0%;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

<img src="./vrt1.png" alt="Logo" id="logo">

<div id="configPanel">
    <h2 style="text-align:center;">Iniciar Service</h2>
    <div class="input-group">
        <label>Nombre del Piloto:</label>
        <input type="text" id="nombreIn">
    </div>
    <div class="input-group">
        <label>Hora de Entrada:</label>
        <input type="time" id="entradaIn" step="1">
    </div>
    <div class="input-group">
        <label>Tiempo Otorgado:</label>
        <input type="time" id="duracionIn" step="1" value="01:00:00">
    </div>
    <button onclick="activarPanel()">GENERAR PANEL</button>
</div>

<div id="displayPanel">
    <div class="main-content">

        <div class="header-info">
            <div class="current-time" id="reloj">00:00:00</div>
            <div class="current-date" id="fecha">--/--/----</div>
            <div class="label-red">Fecha y Hora</div>
        </div>

        <!-- 🔽🔼 FLECHAS INTEGRADAS -->
        <div class="times-row">
            <div class="time-box">
                <div class="time-val" id="valEntrada">00:00:00</div>
                <div class="label-red">
                    Horario de Entrada
                    <span style="color:#28a745; font-size:16px; margin-left:6px;">⬇</span>
                </div>
            </div>

            <div class="time-box">
                <div class="time-val" id="valSalida">00:00:00</div>
                <div class="label-red">
                    Horario de Salida
                    <span style="color:#d9534f; font-size:16px; margin-left:6px;">⬆</span>
                </div>
            </div>
        </div>

        <div class="countdown-card">
            <div class="big-timer" id="timerPrincipal">00:00:00</div>
            <div class="label-red">Tiempo de Service</div>
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
        </div>

        <div class="footer-name" id="valNombre">NOMBRE</div>
    </div>
</div>

<script>
function pad(n){return n.toString().padStart(2,'0');}

function activarPanel(){
    const nombre = nombreIn.value;
    const hEntrada = entradaIn.value;
    const tOtorgado = duracionIn.value;
    if(!nombre||!hEntrada||!tOtorgado) return alert("Completa todos los datos");

    const [eH,eM,eS]=hEntrada.split(':').map(Number);
    const [dH,dM,dS]=tOtorgado.split(':').map(Number);

    const inicio=new Date();
    inicio.setHours(eH,eM,eS||0,0);

    const durMs=((dH||0)*3600+(dM||0)*60+(dS||0))*1000;
    const fin=new Date(inicio.getTime()+durMs);

    configPanel.style.display="none";
    displayPanel.style.display="flex";

    valNombre.innerText=nombre;
    valEntrada.innerText=`${pad(eH)}:${pad(eM)}:${pad(eS||0)}`;
    valSalida.innerText=`${pad(fin.getHours())}:${pad(fin.getMinutes())}:${pad(fin.getSeconds())}`;

    setInterval(()=>{
        const ahora=new Date();
        reloj.innerText=`${pad(ahora.getHours())}:${pad(ahora.getMinutes())}:${pad(ahora.getSeconds())}`;
        fecha.innerText=`${pad(ahora.getDate())}/${pad(ahora.getMonth()+1)}/${ahora.getFullYear()}`;

        const dif=fin-ahora;
        if(dif<=0){
            timerPrincipal.innerText="00:00:00";
            bar.style.width="100%";
        }else{
            const s=Math.floor(dif/1000);
            timerPrincipal.innerText=`${pad(Math.floor(s/3600))}:${pad(Math.floor(s%3600/60))}:${pad(s%60)}`;
            bar.style.width=`${Math.min(((ahora-inicio)/durMs)*100,100)}%`;
        }
    },1000);
}
</script>

</body>
</html>
